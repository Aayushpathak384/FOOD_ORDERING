services:

  postgres:
    image: postgres:18
    container_name: food_app-postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: food_app
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8.6
    container_name: food_app-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: