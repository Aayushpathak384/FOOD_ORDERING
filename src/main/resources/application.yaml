spring:
  application:
    name: Food Ordering App

  datasource:
    url: jdbc:postgresql://localhost:5433/food_app
    username: myuser
    password: mypassword
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      time-to-live: 5m

    cache:
      type: redis

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:user
              - user:email

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

logging:
  level:
    root: INFO